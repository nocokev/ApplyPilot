name: ApplyPilot Pipeline

on:
  schedule:
    - cron: "0 14 * * *"   # 8am MT daily (14:00 UTC)
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[full]" || pip install -e "."

      - name: Copy profile and searches config
        run: |
          mkdir -p ~/.applypilot
          cp profile.json ~/.applypilot/profile.json || true
          cp searches.yaml ~/.applypilot/searches.yaml || true

      - name: Run discovery
        run: python -m applypilot run discover

      - name: Run enrichment
        run: python -m applypilot run enrich
        continue-on-error: true

      - name: Run scoring
        run: python -m applypilot run score
        continue-on-error: true

      - name: Export top leads to JSON
        run: |
          python -m applypilot report --format json --min-score 6 > ~/.applypilot/top_leads.json || true

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: applypilot-db
          path: ~/.applypilot/applypilot.db
          retention-days: 7

      - name: Upload top leads artifact
        uses: actions/upload-artifact@v4
        with:
          name: applypilot-top-leads
          path: ~/.applypilot/top_leads.json
          retention-days: 7
          if-no-files-found: warn
