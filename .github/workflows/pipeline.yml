name: ApplyPilot Pipeline

on:
  schedule:
    - cron: "0 14 * * *"   # 8am MT daily (14:00 UTC)
  workflow_dispatch:        # manual trigger from GitHub UI

concurrency:
  group: applypilot-pipeline
  cancel-in-progress: false  # let current run finish, don't stack

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_MODEL: gpt-4o-mini

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[full]" || pip install -e "."

      - name: Write profile and searches config from secrets
        env:
          APPLYPILOT_PROFILE_JSON: ${{ secrets.APPLYPILOT_PROFILE_JSON }}
          APPLYPILOT_SEARCHES_YAML: ${{ secrets.APPLYPILOT_SEARCHES_YAML }}
        run: |
          mkdir -p ~/.applypilot
          if [ -n "$APPLYPILOT_PROFILE_JSON" ]; then
            echo "$APPLYPILOT_PROFILE_JSON" > ~/.applypilot/profile.json
            echo "profile.json written from secret"
          else
            echo "WARNING: APPLYPILOT_PROFILE_JSON secret not set"
          fi
          if [ -n "$APPLYPILOT_SEARCHES_YAML" ]; then
            echo "$APPLYPILOT_SEARCHES_YAML" > ~/.applypilot/searches.yaml
            echo "searches.yaml written from secret"
          else
            echo "WARNING: APPLYPILOT_SEARCHES_YAML secret not set"
          fi

      - name: Run discovery
        run: python -m applypilot run discover
        continue-on-error: true

      - name: Run enrichment
        run: python -m applypilot run enrich
        continue-on-error: true

      - name: Run scoring
        run: python -m applypilot run score
        continue-on-error: true

      - name: Run tailoring (score >= 7)
        run: python -m applypilot run tailor --min-score 7
        continue-on-error: true

      - name: Run cover letters (score >= 7)
        run: python -m applypilot run cover --min-score 7
        continue-on-error: true

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: applypilot-db
          path: ~/.applypilot/applypilot.db
          retention-days: 7

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: applypilot-output
          path: ~/.applypilot/output/
          retention-days: 7
          if-no-files-found: warn
