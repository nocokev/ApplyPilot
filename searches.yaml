# Kevin Prokop — ApplyPilot Search Configuration
# Updated: April 2026

queries:
  # Tier 1 — Exact target titles
  - query: "Director of Operations"
    tier: 1
  - query: "VP of Operations"
    tier: 1
  - query: "Senior Program Manager"
    tier: 1
  - query: "Senior Project Manager"
    tier: 1
  - query: "Chief of Staff"
    tier: 1
  - query: "Implementation Manager"
    tier: 1

  # Tier 2 — Strong matches
  - query: "Operations Manager"
    tier: 2
  - query: "Program Manager"
    tier: 2
  - query: "Project Manager"
    tier: 2
  - query: "Strategy and Operations"
    tier: 2
  - query: "Implementation Consultant"
    tier: 2
  - query: "Business Value Strategist"
    tier: 2
  - query: "Insights and Operations Partner"
    tier: 2
  - query: "Category Manager"
    tier: 2

  # Tier 3 — Wide net
  - query: "Regional Director of Operations"
    tier: 3
  - query: "Head of Operations"
    tier: 3
  - query: "Director of Delivery"
    tier: 3
  - query: "Senior Operations Manager"
    tier: 3
  - query: "Manufacturing Operations Manager"
    tier: 3
  - query: "Production Manager"
    tier: 3

locations:
  - location: "Boulder, CO"
    remote: false
  - location: "Fort Collins, CO"
    remote: false
  - location: "Denver, CO"
    remote: false
  - location: "Longmont, CO"
    remote: false
  - location: "Broomfield, CO"
    remote: false
  - location: "Loveland, CO"
    remote: false
  - location: "United States"
    remote: true

# These keys match what the code actually reads in _load_location_config()
location_accept:
  - "Boulder"
  - "Fort Collins"
  - "Loveland"
  - "Longmont"
  - "Broomfield"
  - "Lafayette"
  - "Erie"
  - "Denver"
  - "Aurora"
  - "Westminster"
  - "Arvada"
  - "Greeley"
  - "Brighton"
  - "Englewood"
  - "Littleton"
  - "Thornton"
  - "Colorado"
  - ", CO"
  - "Remote"
  - "Anywhere"
  - "United States"
  - "New York"
  - "Seattle"
  - "Los Angeles"
  - "Chicago"
  - "San Francisco"
  - "Austin"
  - "Atlanta"
  - "Boston"
  - "Dallas"
  - "Houston"
